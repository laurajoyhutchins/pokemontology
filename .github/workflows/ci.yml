name: CI

on:
  pull_request:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      ontology: ${{ steps.filter.outputs.ontology }}
      docs: ${{ steps.filter.outputs.docs }}
      python: ${{ steps.filter.outputs.python }}
      queries: ${{ steps.filter.outputs.queries }}
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            ontology:
              - 'ontology/**'
              - 'shapes/**'
              - 'data/**'
            docs:
              - 'docs/**'
            python:
              - 'pokemontology/**'
              - 'pyproject.toml'
              - 'requirements.txt'
            queries:
              - 'queries/**'
            workflows:
              - '.github/workflows/**'

  build-contract:
    runs-on: ubuntu-latest
    needs: changes
    if: >
      github.event_name != 'pull_request' ||
      needs.changes.outputs.ontology == 'true' ||
      needs.changes.outputs.docs == 'true' ||
      needs.changes.outputs.python == 'true' ||
      needs.changes.outputs.queries == 'true' ||
      needs.changes.outputs.workflows == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install project dependencies
        run: python -m pip install .
      - name: Rebuild generated artifacts
        run: python -m pokemontology build
      - name: Verify generated files are committed
        run: |
          git diff --exit-code -- \
            build/ontology.ttl \
            build/shapes.ttl \
            build/schema-index.json \
            docs/ontology.ttl \
            docs/shapes.ttl \
            docs/site-data.json \
            docs/schema-index.json \
            docs/mechanics-base.ttl \
            docs/mechanics-learnsets-current.ttl \
            docs/mechanics-learnsets-modern.ttl \
            docs/mechanics-learnsets-legacy.ttl
      - name: Enforce published TTL size budget
        run: |
          warn_limit=$((50 * 1024 * 1024))
          fail_limit=$((90 * 1024 * 1024))
          status=0
          for path in docs/*.ttl; do
            size=$(stat -c%s "$path")
            if [ "$size" -gt "$warn_limit" ]; then
              mib=$(python -c 'import sys; print(f"{int(sys.argv[1]) / (1024 * 1024):.2f}")' "$size")
              echo "::warning file=$path::Published Turtle artifact is ${mib} MiB"
            fi
            if [ "$size" -gt "$fail_limit" ]; then
              echo "::error file=$path::Published Turtle artifact exceeds hard limit of 90 MiB"
              status=1
            fi
          done
          exit "$status"

  fast-regressions:
    runs-on: ubuntu-latest
    needs: changes
    if: >
      github.event_name != 'pull_request' ||
      needs.changes.outputs.ontology == 'true' ||
      needs.changes.outputs.docs == 'true' ||
      needs.changes.outputs.python == 'true' ||
      needs.changes.outputs.queries == 'true' ||
      needs.changes.outputs.workflows == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install project dependencies
        run: python -m pip install .
      - name: Run fast regression suite
        run: >
          python -m pytest
          tests/test_cli.py
          tests/test_turn_order.py
          tests/test_build_site_assets.py
          tests/test_docs_query_engine.py
          tests/test_e2e.py
