<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Knowledge Graph | Pokemontology</title>
  <meta name="description" content="Query and explore the published Pokemontology knowledge graph as an interactive full-workspace network view.">
  <link rel="stylesheet" href="./styles.css">
</head>
<body class="graph-page">
  <header class="site-header graph-header">
    <div class="site-shell graph-shell">
      <div class="topbar fade-up">
        <a class="brand" href="./index.html">
          <span class="brand-mark">PK</span>
          <span class="brand-copy">
            <strong>Pokemontology</strong>
            <span>Knowledge Graph</span>
          </span>
        </a>
        <nav class="nav-links" aria-label="Primary">
          <a href="./index.html">Query</a>
          <a href="./pokedex.html">Pokedex</a>
          <a href="./graph.html" class="nav-active" aria-current="page">Graph</a>
          <a href="./dev.html">Dev Console</a>
          <a href="https://github.com/laurajoyhutchins/pokemontology" data-repository-url>Repo</a>
        </nav>
        <button class="theme-toggle" type="button" data-theme-toggle aria-pressed="false" aria-label="Toggle dark mode">
          <span data-theme-label>Dark</span>
        </button>
      </div>
    </div>
  </header>

  <main class="graph-workbench">
    <div class="graph-shell">
      <section class="graph-controls panel fade-up" aria-label="Graph query controls">
        <div class="graph-control-row">
          <label class="graph-control graph-control-search" for="graph-search">
            <span class="toolbar-label">Query</span>
            <input
              id="graph-search"
              class="pokedex-search"
              type="search"
              placeholder="Search for a node to focus the graph"
              autocomplete="off"
            >
          </label>
          <label class="graph-control" for="graph-hop-depth">
            <span class="toolbar-label">Depth</span>
            <select id="graph-hop-depth" class="qe-select">
              <option value="1">1 hop</option>
              <option value="2" selected>2 hops</option>
              <option value="3">3 hops</option>
              <option value="4">4 hops</option>
            </select>
          </label>
          <label class="graph-control" for="graph-node-limit">
            <span class="toolbar-label">Node Cap</span>
            <select id="graph-node-limit" class="qe-select">
              <option value="120">120</option>
              <option value="240" selected>240</option>
              <option value="400">400</option>
              <option value="700">700</option>
            </select>
          </label>
          <label class="graph-control" for="graph-ruleset">
            <span class="toolbar-label">Ruleset</span>
            <select id="graph-ruleset" class="qe-select"></select>
          </label>
          <div class="graph-stats-inline">
            <span class="mini-badge" data-graph-status>Loading…</span>
            <span class="mini-badge"><strong data-graph-node-count>0</strong> nodes</span>
            <span class="mini-badge"><strong data-graph-edge-count>0</strong> edges</span>
          </div>
        </div>
        <div class="graph-control-row graph-control-row-compact">
          <div class="graph-filter-pack">
            <span class="toolbar-label">Types</span>
            <div class="graph-filter-row" id="graph-node-filters"></div>
          </div>
          <div class="graph-filter-pack">
            <span class="toolbar-label">Edges</span>
            <div class="graph-filter-row" id="graph-edge-filters"></div>
          </div>
        </div>
      </section>

      <section class="graph-stage fade-up delay-1">
        <div class="graph-canvas-panel panel">
          <div class="graph-stage-head">
            <span class="mini-badge" id="graph-focus-badge">Top-degree overview</span>
            <span class="graph-hover-readout" id="graph-hover-readout">No hover</span>
          </div>
          <div class="graph-canvas-shell">
            <canvas id="graph-canvas" class="graph-canvas" aria-label="Pokemontology knowledge graph visualization"></canvas>
          </div>
        </div>

        <aside class="graph-sidebar panel" aria-labelledby="graph-detail-heading">
          <div class="graph-sidebar-block">
            <div class="graph-panel-head">
              <h2 id="graph-detail-heading">Inspector</h2>
              <span class="mini-badge" id="graph-selection-badge">No selection</span>
            </div>
            <div id="graph-detail">
              <div class="qe-placeholder">
                <span class="qe-placeholder-icon">◎</span>
                <p>Select a node or search to inspect its local graph.</p>
              </div>
            </div>
          </div>

          <div class="graph-sidebar-block">
            <div class="graph-panel-head graph-results-head">
              <h2>Matches</h2>
              <span class="mini-badge" id="graph-results-badge">0 results</span>
            </div>
            <div id="graph-results" class="graph-results">
              <div class="qe-placeholder">
                <span class="qe-placeholder-icon">◌</span>
                <p>Matching nodes will appear here.</p>
              </div>
            </div>
          </div>
        </aside>
      </section>
    </div>
  </main>

  <script type="module" src="./graph.js"></script>
</body>
</html>
